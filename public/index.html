<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva China — Restaurante Chino</title>
  <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  <!-- ===== BARRA SUPERIOR ===== -->
  <header class="topbar" id="topbar">
    <div class="topbar-left">
      <span class="topbar-logo">🥢</span>
      <h1 class="topbar-title">Nueva China</h1>
    </div>
    <nav class="topbar-modes" id="topbarModes">
      <button class="mode-btn" data-mode="cliente" title="Modo Cliente">🍽️</button>
      <button class="mode-btn" data-mode="personal" title="Modo Personal">👨‍🍳</button>
      <button class="mode-btn" data-mode="reparto" title="Modo Reparto">🛵</button>
    </nav>
    <div class="topbar-right">
      <button class="cart-btn" id="cartBtn" title="Ver carrito">
        🛒 <span class="cart-count" id="cartCount" style="display:none">0</span>
      </button>
    </div>
  </header>

  <!-- ===== CONTENEDOR PRINCIPAL ===== -->
  <main class="main-content" id="mainContent">
    <!-- Contenido dinámico según modo -->
  </main>

  <!-- ===== PANEL DEL CARRITO (slide-out) ===== -->
  <div class="cart-overlay" id="cartOverlay"></div>
  <aside class="cart-panel" id="cartPanel">
    <div class="cart-header">
      <h2>🛒 Tu Pedido</h2>
      <button class="cart-close" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems">
      <p class="cart-empty">Tu carrito está vacío</p>
    </div>
    <div class="cart-footer" id="cartFooter" style="display:none">
      <div class="cart-total">
        <span>Total:</span>
        <span class="cart-total-price" id="cartTotal">$0</span>
      </div>
      <button class="btn btn-primary btn-block" id="checkoutBtn">Hacer Pedido</button>
    </div>
  </aside>

  <!-- ===== MODAL GENÉRICO ===== -->
  <div class="modal-overlay" id="modalOverlay"></div>
  <div class="modal" id="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modalTitle"></h3>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>

  <script src="js/app.js"></script>
  <script src="js/menu.js"></script>
  <script src="js/carrito.js"></script>
  <script src="js/pedidos.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
